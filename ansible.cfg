[defaults]
inventory          = ./inventories
remote_user         = ubuntu
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
gathering          = smart
deprecation_warnings = False
inject_facts_as_vars = False
enable_plugins = amazon.aws.aws_ec2, yaml, ini

# This is PE section
[privilege_escalation]
become       = True
become_method = sudo
become_user  = root

[ssh_connection]
# This forces ALL SSH connections to route securely through your Bastion public environment variable
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardAgent=yes -o ProxyCommand="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@$BASTION_PUBLIC_IP"
control_path = %(directory)s/ansible-ssh-%%h-%%p-%%r
