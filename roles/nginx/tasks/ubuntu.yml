---
# ubuntu.yml
# ─── Ubuntu: install specific nginx version ───────────────────────────────────

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install prerequisite packages (Ubuntu)
  apt:
    name:
      - curl
      - gnupg2
      - ca-certificates
      - lsb-release
      - ubuntu-keyring
    state: present

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download nginx signing key (modern method)
  get_url:
    url: https://nginx.org/keys/nginx_signing.key
    dest: /etc/apt/keyrings/nginx.asc
    mode: "0644"

# NOTE: this used to hardcode "jammy" (Ubuntu 22.04). That broke the moment
# the AMI lookup in Terraform was changed to pull the latest Ubuntu, which
# can be a newer release - the apt repo line and the running OS need to
# agree on the codename or "apt update" 404s on the Release file.
- name: Add official nginx stable repo (Ubuntu)
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nginx.asc] http://nginx.org/packages/ubuntu {{ ansible_distribution_release }} nginx"
    state: present
    filename: nginx
    update_cache: true

# Try the pinned version for this exact release first. nginx.org doesn't
# always publish every version for every codename on day one, so fall back
# to "whatever's latest in the repo" rather than hard-failing the whole run.
- name: Install pinned nginx version (Ubuntu)
  apt:
    name: "nginx={{ nginx_version }}-1~{{ ansible_distribution_release }}"
    state: present
    update_cache: true
  register: pinned_install
  ignore_errors: true

- name: Fall back to latest available nginx if the pinned build isn't published for this release
  apt:
    name: nginx
    state: present
    update_cache: true
  when: pinned_install is failed

- name: Hold nginx package at its currently installed version (Ubuntu)
  dpkg_selections:
    name: nginx
    selection: hold # prevents unintended upgrades via apt upgrade
