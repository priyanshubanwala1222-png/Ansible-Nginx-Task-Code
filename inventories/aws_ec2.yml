# inventories/aws_ec2.yml
#
# Dynamic inventory: the ASG can scale instances up/down and recreate them on
# every "terraform apply", so a static hosts.ini with hardcoded IPs goes
# stale immediately. This queries AWS directly at playbook-run time instead.
#
# These instances live in PRIVATE subnets (no public IP) by design, so we
# can't SSH to them directly from Jenkins. We reach them by jumping through
# the bastion host's public IP, which the Jenkins pipeline exports as the
# BASTION_PUBLIC_IP environment variable right after "terraform apply"
# (read from the bastion-public-ip Terraform output).
plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  instance-state-name: running
  tag:Role: webserver

# Display/connect using the private IP (only reachable via the bastion jump).
hostnames:
 - private-ip-address

# NOTE: the original version of this file grouped on "tag.Role" - that key
# doesn't exist on the inventory host vars the aws_ec2 plugin returns. The
# correct path is "tags.Role" (tags is a dict of the instance's AWS tags).
keyed_groups:
 - key: ec2_tags.Role   #  tags.Role
   prefix: role
   separator: "_"

plugin_vars_vars_files:
  - ./bastion_vars.yml

compose:
 ansible_host: private_ip_address
 ansible_user: "'ubuntu'"
# bastion_ip: "query('amazon.aws.aws_ec2', filter={'tag:Role': 'bastion', 'instance-state-name': 'running'})[0].public_ip_address"
 ansible_ssh_common_args: "'-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand=\"ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@' ~ lookup('env','BASTION_PUBLIC_IP') ~ '\"'"
