# inventories/aws_ec2.yml

plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  instance-state-name: running
  tag:Role: webserver

# Display/connect using the private IP (only reachable via the bastion jump).
hostnames:
 - private-ip-address

keyed_groups:
 - key: tags.Role   # ec2_tags.Role
   prefix: role
   separator: "_"

