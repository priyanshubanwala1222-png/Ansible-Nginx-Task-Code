---
# tasks file for nginx

# ─── Detect OS and include the right tasks ────────────────────────────────────
- name: Include Ubuntu tasks
  include_tasks: ubuntu.yml
  when: ansible_facts['distribution'] == "Ubuntu"

# RHEL support intentionally left out for now (this fleet is Ubuntu-only).
# See tasks/rhel.yml if you ever need to bring it back.

# ─── Deploy nginx main config ─────────────────────────────────────────────────
- name: Deploy nginx main config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Ensure Ubuntu virtual host directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
  when: ansible_facts['distribution'] == "Ubuntu"

# ─── Deploy virtual host / server block ──────────────────────────────────────
- name: Deploy server block config (Ubuntu)
  template:
    src: vhost.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts['distribution'] == "Ubuntu"
  notify: Restart nginx

- name: Enable site symlink (Ubuntu)
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  when: ansible_facts['distribution'] == "Ubuntu"
  notify: Restart nginx

# ─── Deploy demo page ──────────────────────────────────────────────────────────
# Without this, "/" 404s (try_files in vhost.conf.j2 falls through to =404
# because nginx_root has no index.html in it), even though nginx itself is
# running fine. The ALB health check is pointed at /health instead precisely
# to avoid depending on this file - but you want this for the actual demo.
- name: Ensure web root exists
  file:
    path: "{{ nginx_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy demo index page
  template:
    src: index.html.j2
    dest: "{{ nginx_root }}/index.html"
    owner: root
    group: root
    mode: "0644"

# ─── Firewall ─────────────────────────────────────────────────────────────────
- name: Allow port {{ nginx_port }} in UFW (Ubuntu)
  ufw:
    rule: allow
    port: "{{ nginx_port }}"
    proto: tcp
  when: ansible_facts['distribution'] == "Ubuntu"
  ignore_errors: true # ok if ufw isn't installed/active on this AMI - SG already restricts access at the AWS layer

# ─── Start and enable nginx ───────────────────────────────────────────────────
- name: Ensure nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: true

# ─── Verify ───────────────────────────────────────────────────────────────────
- name: Verify nginx responds on port {{ nginx_port }}
  uri:
    url: "http://localhost:{{ nginx_port }}/health"
    status_code: 200
  register: nginx_check
  retries: 3
  delay: 5
  until: nginx_check.status is defined and nginx_check.status == 200
  ignore_errors: true

- name: Show port check result
  debug:
    msg: "Nginx is {{ 'UP' if (nginx_check.status | default(0)) == 200 else 'NOT responding' }} on port {{ nginx_port }}"
