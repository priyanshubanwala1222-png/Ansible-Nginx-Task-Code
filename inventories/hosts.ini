# This static inventory is now just a manual fallback for troubleshooting
# (e.g. testing the role against your own box directly). The pipeline and
# ansible.cfg use inventories/aws_ec2.yml (dynamic) by default, since the
# real targets are ASG instances with IPs that change on every apply.
#
# To use this manually instead of the dynamic inventory:
#   ansible-playbook -i inventories/hosts.ini site.yml -e "ansible_ssh_private_key_file=/path/to/ansible-green.pem"

[ubuntu]
# ubuntu-server-1 ansible_host=203.0.113.10 ansible_user=ubuntu

[all:vars]
ansible_python_interpreter=/usr/bin/python3
